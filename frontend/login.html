<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJPOS — Iniciar sesión</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f0faf5;--bg3:#e5f7ee;
  --text:#102A24;--text2:#2a5040;--text3:#4a7060;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --blue:#0B8457;--blue-d:#086644;
  --red:#E24B4A;--red-l:#FCEBEB;
  --r:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1e1e1c;--bg2:#2a2a27;--bg3:#323230;
  --text:#f0efe8;--text2:#a0a09a;--text3:#6b6b67;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg3);min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%}
.login-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:36px 32px;width:360px;max-width:calc(100% - 48px)}
.login-logo{text-align:center;margin-bottom:8px}
.field{margin-bottom:14px}
.field label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px}
.field input{width:100%;padding:9px 12px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:14px;outline:none;font-family:inherit}
.field input:focus{border-color:var(--blue)}
.pass-wrap{position:relative}
.pass-wrap input{padding-right:38px}
.pass-toggle{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;padding:4px 6px;line-height:1}
.btn{width:100%;padding:11px;border:none;border-radius:var(--r);cursor:pointer;font-size:14px;font-weight:500;font-family:inherit}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-d)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.btn-sm{padding:6px 14px;font-size:12px;width:auto}
.btn-outline{background:transparent;border:0.5px solid var(--border2);color:var(--text)}
.btn-outline:hover{background:var(--bg2)}
.error-msg{background:var(--red-l);color:var(--red);padding:9px 12px;border-radius:var(--r);font-size:13px;margin-bottom:12px;display:none}
.fp-box{display:none;margin-top:16px;padding-top:16px;border-top:0.5px solid var(--border)}
.fp-msg{font-size:12px;color:var(--text2);margin-top:8px;text-align:center}
.portal-footer{margin-top:20px;color:var(--text2);font-size:.72rem;text-align:center}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <img src="/img/logo.png" alt="DJPOS" style="width:100%;height:auto;max-height:200px;object-fit:contain;border-radius:14px;margin-bottom:10px">
    </div>
    <div class="error-msg" id="login-error"></div>
    <div class="field"><label>Email o usuario</label><input id="l-login" type="text" placeholder="usuario o correo" autocomplete="username"></div>
    <div class="field"><label>Contraseña</label>
      <div class="pass-wrap">
        <input id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        <button type="button" class="pass-toggle" id="l-pass-eye" onclick="togglePassword()" title="Mostrar contraseña">👁</button>
      </div>
    </div>
    <button class="btn btn-primary" id="btn-login" onclick="doLogin()">Ingresar</button>
    <div style="margin-top:10px;text-align:center"><button class="btn btn-outline btn-sm" onclick="toggleForgot()">¿Olvidaste tu contraseña?</button></div>

    <div class="fp-box" id="fp-box">
      <div class="field"><label>Email o usuario</label><input id="fp-login" placeholder="usuario o correo"></div>
      <button class="btn btn-primary btn-sm" onclick="forgotPassword()">Enviar</button>
      <div class="fp-msg" id="fp-msg"></div>
    </div>
  </div>

  <div class="portal-footer" style="display:flex;align-items:center;justify-content:center;gap:6px">
    <img src="/img/logo.png" alt="DJPOS" style="width:16px;height:16px;object-fit:contain;border-radius:4px;vertical-align:middle">
    Powered by DJPOS
  </div>
</div>

<script>
const API = '/api';

document.getElementById('l-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// Al volver con el botón "atrás" del navegador, Chrome restaura la página
// congelada desde el bfcache (botón en "Verificando…"). La reseteamos.
window.addEventListener('pageshow', e => {
  if (e.persisted) {
    const btn = document.getElementById('btn-login');
    btn.disabled = false;
    btn.textContent = 'Ingresar';
    document.getElementById('login-error').style.display = 'none';
  }
});

// Mismas claves de sessionStorage que espera cada portal (igual que portal.html)
const SS_KEYS = {
  peluqueria:  { admin: 'pel_token',     pos: 'pos_pel_token' },
  minimercado: { admin: 'bdj_adm_token', pos: 'mini_pos_tok'  },
};
function getKeys(t){ return SS_KEYS[t] || { admin: 'bdj_adm_token', pos: 'bdj_pos_token' }; }

function guardarSesion(tipo, token, user){
  if (tipo === 'peluqueria') {
    sessionStorage.setItem('pel_token', token);
    sessionStorage.setItem('pel_nombre', user.nombre || '');
    sessionStorage.setItem('pel_rol', user.rol_nombre || '');
    sessionStorage.setItem('pel_permisos', JSON.stringify(user.permisos || {}));
    sessionStorage.setItem('pel_superadmin', user.es_superadmin ? '1' : '0');
    sessionStorage.setItem('pel_negocio_id', user.negocio_id || '');
    sessionStorage.setItem('pos_pel_token', token);
    sessionStorage.setItem('pos_pel_user', user.nombre || '');
    sessionStorage.setItem('pos_pel_rol', user.rol_nombre || '');
  } else if (tipo === 'minimercado') {
    sessionStorage.setItem('bdj_adm_token', token);
    sessionStorage.setItem('mini_pos_tok', token);
    sessionStorage.setItem('mini_pos_nombre', user.nombre || '');
    sessionStorage.setItem('mini_pos_rol', user.rol_nombre || '');
  } else {
    sessionStorage.setItem('bdj_adm_token', token);
    sessionStorage.setItem('bdj_pos_token', token);
  }
}

async function doLogin() {
  if (document.documentElement.requestFullscreen && !document.fullscreenElement) { document.documentElement.requestFullscreen().catch(()=>{}); }
  const login = document.getElementById('l-login').value.trim();
  const pass  = document.getElementById('l-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none'; errEl.textContent = '';
  if (!login || !pass) { errEl.textContent = 'Completa todos los campos'; errEl.style.display = 'block'; return; }

  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Verificando…';
  try {
    const r = await fetch(`${API}/auth/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ login, password: pass })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Credenciales incorrectas');

    const { token, user } = d;

    // Superadmin sin negocio propio → panel de superadministración
    if (user.es_superadmin && !user.negocio_id) {
      sessionStorage.setItem('bdj_token', token);
      location.href = '/superadmin';
      return;
    }
    if (!user.negocio_id) throw new Error('Tu usuario no tiene un negocio asignado');

    // Determinar el tipo de negocio para guardar la sesión con las claves correctas
    const neg = await fetch(`${API}/negocio-pub/${user.negocio_id}`).then(r => r.ok ? r.json() : null);
    const tipo = neg?.tipo || 'restaurante';
    guardarSesion(tipo, token, user);

    // Redirige al portal propio del negocio (ya autenticado: portal.html detecta
    // la sesión guardada y muestra directamente las tarjetas de Admin/POS)
    location.href = `/portal.html?n=${user.negocio_id}`;
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Ingresar';
  }
}

function togglePassword() {
  const input = document.getElementById('l-pass');
  const eye = document.getElementById('l-pass-eye');
  const visible = input.type === 'password';
  input.type = visible ? 'text' : 'password';
  eye.textContent = visible ? '🙈' : '👁';
  eye.title = visible ? 'Ocultar contraseña' : 'Mostrar contraseña';
}

function toggleForgot() {
  const box = document.getElementById('fp-box');
  box.style.display = box.style.display === 'block' ? 'none' : 'block';
}

async function forgotPassword() {
  const login = document.getElementById('fp-login').value.trim();
  const msgEl = document.getElementById('fp-msg');
  if (!login) { msgEl.textContent = 'Ingresa tu usuario o correo'; return; }
  msgEl.textContent = 'Enviando…';
  try {
    const r = await fetch(`${API}/auth/forgot-password`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ login })
    });
    const d = await r.json();
    const msg = d.message || 'Si el usuario existe, se generó una contraseña temporal.';
    if (d.tempPassword) {
      msgEl.innerHTML = `${msg} <code id="fp-temp-pass" style="font-weight:700">${d.tempPassword}</code> <button type="button" class="btn btn-outline btn-sm" onclick="copiarTempPass(this)">Copiar</button>`;
    } else {
      msgEl.textContent = msg;
    }
  } catch (e) {
    msgEl.textContent = 'Error: ' + e.message;
  }
}
function copiarTempPass(btn) {
  const pass = document.getElementById('fp-temp-pass').textContent;
  navigator.clipboard.writeText(pass).then(() => {
    const original = btn.textContent;
    btn.textContent = '✓ Copiada';
    setTimeout(() => { btn.textContent = original; }, 1500);
  });
}
</script>
</body>
</html>
