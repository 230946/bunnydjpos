<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BunnyDJPOS</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--pri:#6c3fc5;--pri2:#5530a8;--bg:#f4f2fb;--card:#fff;--text:#1a1a2e;--text2:#64748b;--border:#e2e8f0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 16px 48px}

  .logo{font-size:40px;margin-bottom:6px}
  .brand{font-size:22px;font-weight:800;color:var(--pri);margin-bottom:2px}
  .sub{font-size:13px;color:var(--text2);margin-bottom:36px}

  .section-label{
    width:100%;max-width:640px;
    font-size:10px;font-weight:800;color:var(--text2);letter-spacing:1.2px;
    text-transform:uppercase;margin-bottom:10px;padding-left:2px
  }
  .grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
    width:100%;max-width:640px;margin-bottom:28px
  }
  .card{
    background:var(--card);border:1.5px solid var(--border);border-radius:18px;
    padding:24px 12px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;
    text-decoration:none;color:var(--text);cursor:pointer;
    box-shadow:0 2px 12px rgba(108,63,197,.06);
    transition:transform .13s,box-shadow .13s,border-color .13s
  }
  .card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(108,63,197,.14);border-color:var(--pri)}
  .card:active{transform:translateY(0)}
  .card-icon{font-size:36px;line-height:1}
  .card-name{font-size:13px;font-weight:700;text-align:center;line-height:1.3}

  @media(max-width:480px){
    .grid{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>
<body>

<div class="logo">🐰</div>
<div class="brand">BunnyDJPOS</div>
<div class="sub">Selecciona el módulo</div>

<div class="section-label">Punto de venta</div>
<div class="grid">
  <a class="card" href="/pos">
    <div class="card-icon">🍽️</div>
    <div class="card-name">POS Restaurante</div>
  </a>
  <a class="card" href="/minimercado">
    <div class="card-icon">🛒</div>
    <div class="card-name">POS Minimercado</div>
  </a>
  <a class="card" href="/peluqueria">
    <div class="card-icon">✂️</div>
    <div class="card-name">POS Peluquería</div>
  </a>
</div>

<div class="section-label">Administración</div>
<div class="grid">
  <a class="card" href="/admin">
    <div class="card-icon">⚙️</div>
    <div class="card-name">Admin Restaurante</div>
  </a>
  <a class="card" href="/minimercado-admin">
    <div class="card-icon">🏪</div>
    <div class="card-name">Admin Minimercado</div>
  </a>
  <a class="card" href="/peluqueria-admin">
    <div class="card-icon">💇</div>
    <div class="card-name">Admin Peluquería</div>
  </a>
</div>

<div class="section-label">Domicilios</div>
<div class="grid" style="grid-template-columns:repeat(2,1fr);max-width:420px">
  <a class="card" href="/domiciliario">
    <div class="card-icon">🛵</div>
    <div class="card-name">App Repartidor</div>
  </a>
  <a class="card" href="/domicilios">
    <div class="card-icon">📱</div>
    <div class="card-name">App Cliente</div>
  </a>
</div>

</body>
</html>
